<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trilatération - Carte des Stations</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
  <style>
    #map { height: calc(100vh - 100px); width: 100%; }
    body, html { margin: 0; padding: 0; height: 100%; }
    .delete-btn {
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      margin-top: 8px;
      font-size: 12px;
    }
    .delete-btn:hover { background: #dc2626; }
    .pin-btn {
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: background 0.2s;
    }
    .pin-btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .pin-btn:hover:not(:disabled) { background: #dc2626; }
    .custom-pin {
      background: #ef4444;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      width: 24px;
      height: 24px;
      border: 2px solid white;
      box-shadow: 0 0 5px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div class="bg-white p-4 shadow-md">
    <div class="flex justify-between items-center">
      <h1 class="text-xl font-bold text-gray-800">Trilatération - Stations</h1>
      <form id="form" class="flex items-center gap-2">
        <div class="flex flex-col gap-1 items-center">
          <div class="flex gap-1">
            <input
              type="text"
              id="stationInput"
              placeholder="ID Station"
              class="px-3 py-2 border border-gray-300 rounded-md text-sm w-48"
            />
            <input
              type="number"
              id="distanceInput"
              placeholder="Rayon (m)"
              min="1"
              step="1"
              class="px-3 py-2 border border-gray-300 rounded-md text-sm w-48"
            />
          </div>
          <div class="flex gap-1">
            <button
              type="button"
              id="addButton"
              class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-md text-sm font-medium"
            >
              Ajouter
            </button>
            <button
              type="submit"
              class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-md text-sm font-medium"
            >
              Valider
            </button>
            <button
              type="button"
              id="pinButton"
              class="pin-btn"
              title="Poser une épingle"
            >
              📌
            </button>
          </div>
        </div>
      </form>
    </div>
    <p id="error" class="text-red-500 text-sm mt-2"></p>
    <p id="loading" class="text-gray-500 text-sm mt-2">Chargement des stations...</p>
    <p id="count" class="text-gray-500 text-sm mt-2"></p>
    <p id="filterInfo" class="text-gray-500 text-sm mt-2"></p>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

  <script>
    // Variables globales
    let map;
    let allStations = [];
    let filteredStations = [];
    let circles = [];
    let markerClusterGroup;
    const circleLayers = [];
    const pinLayers = [];
    let updateTimeout = null;
    let isPinModeActive = false;

    // Coordonnées de la Tour Eiffel
    const tourEiffel = [48.8584, 2.2945];
    const defaultZoom = 14;
    const maxRadiusKm = 10;

    // Fonction pour activer/désactiver les clics sur les cercles
    function setCirclesInteractive(interactive) {
      circleLayers.forEach(circle => {
        circle.options.interactive = interactive;
        circle.setStyle(circle.options);
        if (interactive) {
          circle.on('click', (e) => {
            circle.openPopup(e.latlng);
          });
        } else {
          circle.off('click');
        }
      });
    }

    // Initialiser la carte
    function initMap() {
      map = L.map('map').setView(tourEiffel, defaultZoom);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      }).addTo(map);

      markerClusterGroup = L.markerClusterGroup({
        maxClusterRadius: 50,
        spiderfyOnMaxZoom: true,
      });
      map.addLayer(markerClusterGroup);

      // Écouter les clics sur la carte pour poser une épingle
      map.on('click', (e) => {
        if (isPinModeActive) {
          addCustomPin(e.latlng.lat, e.latlng.lng);
        }
      });

      map.on('moveend', () => {
        if (updateTimeout) clearTimeout(updateTimeout);
        updateTimeout = setTimeout(filterStationsInView, 3000);
      });
    }

    // Ajouter une épingle personnalisée
    function addCustomPin(lat, lng) {
      const pinId = Date.now() + Math.random().toString(36).substring(2, 9);

      const customPinIcon = L.divIcon({
        className: 'custom-pin',
        iconSize: [24, 24],
        html: '📌'
      });

      const pin = L.marker([lat, lng], { icon: customPinIcon }).addTo(map);
      pin.myId = pinId;

      const popupContent = document.createElement('div');
      popupContent.innerHTML = `
        <div>
          <p><strong>Position:</strong> ${lat.toFixed(6)}, ${lng.toFixed(6)}</p>
          <button class="delete-btn" onclick="deleteCustomPin('${pinId}')">🗑️ Supprimer</button>
        </div>
      `;
      pin.bindPopup(popupContent);

      pinLayers.push(pin);

      // Réactiver le bouton épingle ET les clics sur les cercles
      document.getElementById('pinButton').disabled = false;
      isPinModeActive = false;
      setCirclesInteractive(true);
    }

    // Supprimer une épingle personnalisée
    function deleteCustomPin(pinId) {
      const index = pinLayers.findIndex(layer => layer.myId === pinId);
      if (index !== -1) {
        map.removeLayer(pinLayers[index]);
        pinLayers.splice(index, 1);
      }
    }

    // Filtrer les stations dans la zone visible
    function filterStationsInView() {
      const bounds = map.getBounds();
      filteredStations = allStations.filter(station => {
        return bounds.contains([station.LAT, station.LON]);
      });

      updateMarkers();
      document.getElementById('filterInfo').textContent =
        `Stations affichées: ${filteredStations.length} / ${allStations.length}`;
    }

    // Mettre à jour les marqueurs
    function updateMarkers() {
      markerClusterGroup.clearLayers();

      filteredStations.forEach(station => {
        const marker = L.marker([station.LAT, station.LON]);
        marker.bindPopup(`
          <div>
            <h3 style="font-weight: bold;">${station.STA_NM_ANFR}</h3>
            <p>ID: ${station.SUP_ID}</p>
            <p>Lat: ${station.LAT.toFixed(6)}, Lon: ${station.LON.toFixed(6)}</p>
            <p>${station.ADR_LB_LIEU}</p>
            <p>${station.ADR_LB_ADD1}</p>
          </div>
        `);
        markerClusterGroup.addLayer(marker);
      });
    }

    // Calculer la distance en km
    function getDistanceInKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    // Charger les stations
    async function loadStations() {
      try {
        const startTime = performance.now();
        const response = await fetch('assets/stations.csv?t=' + Date.now());
        if (!response.ok) throw new Error('Fichier stations.csv non trouvé.');

        const csvText = await response.text();
        const lines = csvText.split('\n').filter(line => line.trim() !== '');
        if (lines.length < 2) throw new Error('Fichier CSV vide ou mal formaté.');

        for (let i = 1; i < lines.length; i++) {
          const values = lines[i].split(';');
          if (values.length < 13) continue;

          const station = {
            SUP_ID: values[0].trim(),
            STA_NM_ANFR: values[1].trim(),
            NAT_ID: values[2].trim(),
            LAT: parseFloat(values[3].trim() || '0'),
            LON: parseFloat(values[4].trim() || '0'),
            SUP_NM_HAUT: values[5].trim(),
            TPO_ID: values[6].trim(),
            ADR_LB_LIEU: values[7].trim(),
            ADR_LB_ADD1: values[8].trim(),
            ADR_LB_ADD2: values[9].trim(),
            ADR_LB_ADD3: values[10].trim(),
            ADR_NM_CP: values[11].trim(),
            COM_CD_INSEE: values[12].trim(),
          };

          if (isNaN(station.LAT) || isNaN(station.LON)) continue;
          allStations.push(station);
        }

        filteredStations = allStations.filter(station => {
          const distance = getDistanceInKm(tourEiffel[0], tourEiffel[1], station.LAT, station.LON);
          return distance <= maxRadiusKm;
        });

        updateMarkers();

        const endTime = performance.now();
        document.getElementById('loading').textContent = '';
        document.getElementById('count').textContent =
          `Stations chargées: ${allStations.length} (${filteredStations.length} dans la zone initiale)`;
        document.getElementById('filterInfo').textContent =
          `Stations affichées: ${filteredStations.length} / ${allStations.length}`;
      } catch (err) {
        document.getElementById('error').textContent = `Erreur: ${err.message}`;
        document.getElementById('loading').textContent = '';
      }
    }

    // Supprimer un cercle par son ID
    function deleteCircle(circleId) {
      const index = circleLayers.findIndex(layer => layer.myIndex === circleId);
      if (index !== -1) {
        map.removeLayer(circleLayers[index]);
        circleLayers.splice(index, 1);
      }
    }

    // Ajouter un cercle
    function addCircle() {
      const stationInput = document.getElementById('stationInput').value.trim();
      const distanceInput = document.getElementById('distanceInput').value.trim();

      if (!stationInput || !distanceInput) {
        document.getElementById('error').textContent = 'Veuillez renseigner un identifiant et une distance.';
        return;
      }

      const radius = parseFloat(distanceInput);
      if (isNaN(radius) || radius <= 0) {
        document.getElementById('error').textContent = 'La distance doit être un nombre positif.';
        return;
      }

      const station = allStations.find(s => s.SUP_ID === stationInput);
      if (!station) {
        document.getElementById('error').textContent = `Station ${stationInput} introuvable.`;
        return;
      }

      const circleId = Date.now() + Math.random().toString(36).substring(2, 9);

      const circle = L.circle([station.LAT, station.LON], {
        radius: radius,
        color: 'blue',
        fillColor: 'blue',
        fillOpacity: 0.2,
      }).addTo(map);

      circle.myIndex = circleId;

      const popupContent = document.createElement('div');
      popupContent.innerHTML = `
        <div>
          <p><strong>Station:</strong> ${stationInput}</p>
          <p><strong>Rayon:</strong> ${radius} mètres</p>
          <button class="delete-btn" onclick="deleteCircle('${circleId}')">🗑️ Supprimer</button>
        </div>
      `;
      circle.bindPopup(popupContent);

      circleLayers.push(circle);

      // Réactiver les clics sur ce nouveau cercle
      circle.on('click', (e) => {
        circle.openPopup(e.latlng);
      });

      map.setView([station.LAT, station.LON], defaultZoom);
      document.getElementById('stationInput').value = '';
      document.getElementById('distanceInput').value = '';
      document.getElementById('error').textContent = '';
    }

    // Activer/désactiver le mode épingle
    function togglePinMode() {
      isPinModeActive = !isPinModeActive;
      const pinButton = document.getElementById('pinButton');
      pinButton.disabled = isPinModeActive;

      // Désactiver les clics sur les cercles si on active le mode épingle
      setCirclesInteractive(!isPinModeActive);
    }

    // Écouteurs
    document.getElementById('addButton').addEventListener('click', addCircle);
    document.getElementById('form').addEventListener('submit', (e) => {
      e.preventDefault();
      addCircle();
    });
    document.getElementById('pinButton').addEventListener('click', togglePinMode);

    // Initialisation
    initMap();
    loadStations();
  </script>
</body>
</html>

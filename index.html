<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNT - Trilatération</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet MarkerCluster CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- PapaParse pour lire facilement le fichier CSV -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <!-- FontAwesome pour le logo Pin -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    /* Ajustement plein écran */
    html, body { height: 100%; margin: 0; padding: 0; }
    #map { height: calc(100vh - 64px); width: 100%; }
    /* Curseur spécial en mode Pin */
    body.pin-mode #map { cursor: crosshair !important; }
  </style>
</head>
<body class="bg-gray-100 flex flex-col font-sans">

  <!-- Menu Supérieur -->
  <header class="h-16 bg-slate-900 text-white flex items-center justify-between px-6 shadow-md z-20">
    
    <!-- Zone Gauche -->
    <div class="flex items-center space-x-6">
      <h1 class="text-xl font-bold tracking-wide text-sky-400">SNT - Trilatération</h1>
      <div id="status-counter" class="text-sm bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 text-slate-300">
        Chargement du CSV...
      </div>
    </div>

    <!-- Zone Droite (Formulaire) -->
    <form id="form-trilateration" class="flex items-center space-x-3" onsubmit="event.preventDefault(); addTrilaterationCircle();">
      <div class="flex items-center bg-slate-800 rounded-lg px-2 py-1 border border-slate-700">
        <label for="station-id" class="text-xs text-slate-400 mr-2">ID Station:</label>
        <input type="text" id="station-id" required placeholder="Ex: 123456" 
               class="bg-transparent text-sm text-white focus:outline-none w-28">
      </div>

      <div class="flex items-center bg-slate-800 rounded-lg px-2 py-1 border border-slate-700">
        <label for="circle-radius" class="text-xs text-slate-400 mr-2">Rayon (m):</label>
        <input type="number" id="circle-radius" required min="1" placeholder="Ex: 1000" 
               class="bg-transparent text-sm text-white focus:outline-none w-24">
      </div>

      <button type="submit" 
              class="bg-sky-600 hover:bg-sky-500 text-white text-sm font-semibold px-4 py-1.5 rounded-lg transition">
        Valider
      </button>

      <!-- Bouton Pin -->
      <button type="button" id="btn-pin" title="Ajouter une épingle" 
              class="w-9 h-9 flex items-center justify-center rounded-lg bg-red-600 hover:bg-red-500 text-white transition">
        <i class="fa-solid fa-thumbtack text-lg"></i>
      </button>
    </form>
  </header>

  <!-- Zone Carte -->
  <main id="map" class="relative z-10"></main>

  <!-- Script Application -->
  <script>
// --- VARIABLES GLOBALES ---
    const TOUR_EIFFEL_COORDS = [48.8584, 2.2945];
    const MAX_VISIBLE_STATIONS = 100000; // Seuil porté à 10 000
    
    let map;
    let markersClusterGroup;
    let allStations = []; 
    let circlesLayerGroup; 
    let pinsLayerGroup;    
    let isPinMode = false;

    // Gestionnaire des formes dessinées (disques / épingles)
    const activeShapes = {};
    let shapeCounter = 0;

    // --- INITIALISATION DE LA CARTE ---
    function initMap() {
      map = L.map('map').setView(TOUR_EIFFEL_COORDS, 12);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors | SNT'
      }).addTo(map);

      // OPTIMISATION : Rayon ajusté à 90px et chargement par blocs
      markersClusterGroup = L.markerClusterGroup({ 
        maxClusterRadius: 90,     // Ajustement plus fin du regroupement
        chunkedLoading: true,     // Rendu progressif pour éviter les ralentissements
        disableClusteringAtZoom: 17 
      });
      
      circlesLayerGroup = L.layerGroup().addTo(map);
      pinsLayerGroup = L.layerGroup().addTo(map);
      map.addLayer(markersClusterGroup);

      map.on('moveend zoomend', updateVisibleStations);
      map.on('click', handleMapClick);

      document.getElementById('btn-pin').addEventListener('click', togglePinMode);

      loadCSVData();
    }

    // --- CHARGEMENT ET PARSING DU CSV ---
    function loadCSVData() {
      Papa.parse("stations.csv", {
        download: true,
        header: true,
        skipEmptyLines: true,
        delimiter: ";",
        transformHeader: function(h) {
          return h.trim().replace(/^["']|["']$/g, '');
        },
        complete: function(results) {
          allStations = results.data.map(st => {
            let rawLat = st.LAT ? parseFloat(st.LAT.toString().replace(',', '.')) : NaN;
            let rawLon = st.LON ? parseFloat(st.LON.toString().replace(',', '.')) : NaN;

            if (Math.abs(rawLat) > 180) rawLat = rawLat / 1000000;
            if (Math.abs(rawLon) > 180) rawLon = rawLon / 1000000;

            let lat = rawLat, lon = rawLon;
            if (rawLat >= -5 && rawLat <= 10 && rawLon >= 41 && rawLon <= 51) {
              lat = rawLon; lon = rawLat;
            }

            return { ...st, parsedLat: lat, parsedLon: lon };
          }).filter(st => !isNaN(st.parsedLat) && !isNaN(st.parsedLon));

          updateVisibleStations();
        }
      });
    }

// --- AFFICHAGE PARESSEUX ET SOUS-ÉCHANTILLONNAGE ---
    function updateVisibleStations() {
      if (allStations.length === 0) return;

      const bounds = map.getBounds();
      const visibleStations = allStations.filter(st => bounds.contains([st.parsedLat, st.parsedLon]));
      const counterElem = document.getElementById('status-counter');

      let stationsToRender = visibleStations;

      if (visibleStations.length > MAX_VISIBLE_STATIONS) {
        // Au lieu de tout masquer, on prend 1 antenne sur N pour garder une densité visuelle exacte
        const step = Math.ceil(visibleStations.length / MAX_VISIBLE_STATIONS);
        stationsToRender = visibleStations.filter((_, index) => index % step === 0);

        counterElem.innerText = `${visibleStations.length.toLocaleString('fr-FR')} antennes dans la zone (affichage fluide de ${stationsToRender.length.toLocaleString('fr-FR')} points - Zoomez pour tout voir)`;
        counterElem.className = "text-sm bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 text-amber-400 font-semibold";
      } else {
        counterElem.className = "text-sm bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 text-slate-300";
        counterElem.innerText = `Nombre de stations affichées : ${visibleStations.length.toLocaleString('fr-FR')} / ${allStations.length.toLocaleString('fr-FR')}`;
      }

      markersClusterGroup.clearLayers();
      const markers = stationsToRender.map(st => {
        const marker = L.marker([st.parsedLat, st.parsedLon]);
        marker.bindPopup(createStationPopupContent(st));
        return marker;
      });
      markersClusterGroup.addLayers(markers);
    }

    // --- CRÉATION DE DISQUE DE TRILATÉRATION ---
    function addTrilaterationCircle() {
      const stationId = document.getElementById('station-id').value.trim();
      const radius = parseFloat(document.getElementById('circle-radius').value);

      const station = allStations.find(s => s.ID === stationId);
      if (!station) {
        alert(`Station avec l'ID "${stationId}" introuvable.`);
        return;
      }

      const center = [station.parsedLat, station.parsedLon];
      const shapeId = 'shape_' + (shapeCounter++);

      const circle = L.circle(center, {
        color: '#0284c7',
        fillColor: '#38bdf8',
        fillOpacity: 0.25,
        radius: radius,
        interactive: !isPinMode 
      });

      activeShapes[shapeId] = { layer: circle, group: circlesLayerGroup };

      circle.on('click', (e) => {
        if (isPinMode) return;
        
        const popupContent = `
          ${createStationPopupContent(station)}
          <div class="mt-3 text-right border-t pt-2">
            <button onclick="removeShape('${shapeId}')" class="bg-red-600 hover:bg-red-500 text-white text-xs px-3 py-1.5 rounded transition shadow-sm">
              <i class="fa-solid fa-trash mr-1"></i> Supprimer la zone
            </button>
          </div>
        `;
        L.popup().setLatLng(e.latlng).setContent(popupContent).openOn(map);
      });

      circlesLayerGroup.addLayer(circle);
      map.flyTo(center, 14);
    }

    // --- CONTENU POPUP STATION ---
    function createStationPopupContent(st) {
      return `
        <div class="text-sm font-sans p-1 min-w-[200px]">
          <h3 class="font-bold text-sky-700 text-base mb-2 border-b pb-1">Antenne Télécom</h3>
          <div class="space-y-1.5">
            <div class="flex items-center justify-between gap-4">
              <span><b>ID:</b> ${st.ID || ''}</span>
              <button onclick="copyToClipboard('${st.ID || ''}')" class="text-xs bg-gray-200 hover:bg-gray-300 px-2 py-0.5 rounded">Copier</button>
            </div>
            <div class="flex items-center justify-between gap-4">
              <span><b>GPS:</b> ${st.parsedLat}, ${st.parsedLon}</span>
              <button onclick="copyToClipboard('${st.parsedLat}, ${st.parsedLon}')" class="text-xs bg-gray-200 hover:bg-gray-300 px-2 py-0.5 rounded">Copier</button>
            </div>
            <div><b>Opérateur:</b> <span class="font-medium text-slate-800">${st.OPR || 'N/C'}</span></div>
            <div><b>Technologie:</b> <span class="inline-block bg-sky-100 text-sky-800 text-xs px-2 py-0.5 rounded font-bold">${st.SYST || 'N/C'}</span></div>
            <div class="text-xs text-gray-600 mt-1"><b>Adresse:</b> ${st.ADR || 'Non renseignée'}</div>
          </div>
        </div>
      `;
    }

    // --- GESTION DU MODE PIN (ÉPINGLE) ---
    function togglePinMode() {
      isPinMode = !isPinMode;
      const btn = document.getElementById('btn-pin');

      if (isPinMode) {
        btn.classList.replace('bg-red-600', 'bg-gray-500');
        btn.classList.replace('hover:bg-red-500', 'hover:bg-gray-400');
        document.body.classList.add('pin-mode');
        circlesLayerGroup.eachLayer(layer => layer.getElement() && (layer.getElement().style.pointerEvents = 'none'));
      } else {
        btn.classList.replace('bg-gray-500', 'bg-red-600');
        btn.classList.replace('hover:bg-gray-400', 'hover:bg-red-500');
        document.body.classList.remove('pin-mode');
        circlesLayerGroup.eachLayer(layer => layer.getElement() && (layer.getElement().style.pointerEvents = 'auto'));
      }
    }

    // Clic pour ajouter une épingle
    function handleMapClick(e) {
      if (!isPinMode) return;

      const lat = e.latlng.lat.toFixed(6);
      const lon = e.latlng.lng.toFixed(6);
      const shapeId = 'shape_' + (shapeCounter++);

      const pinIcon = L.divIcon({
        html: '<i class="fa-solid fa-location-dot text-red-600 text-3xl -translate-x-1/2 -translate-y-full drop-shadow"></i>',
        className: 'custom-pin-icon',
        iconSize: [0, 0]
      });

      const pinMarker = L.marker([lat, lon], { icon: pinIcon });
      
      activeShapes[shapeId] = { layer: pinMarker, group: pinsLayerGroup };

      const popupContent = `
        <div class="text-sm font-sans p-1">
          <h4 class="font-bold text-red-600 mb-1">Épingle repère</h4>
          <div class="flex items-center justify-between gap-4 mb-2">
            <span><b>LAT, LON:</b> ${lat}, ${lon}</span>
            <button onclick="copyToClipboard('${lat}, ${lon}')" class="text-xs bg-gray-200 hover:bg-gray-300 px-2 py-0.5 rounded">Copier</button>
          </div>
          <div class="mt-2 text-right border-t pt-2">
            <button onclick="removeShape('${shapeId}')" class="bg-red-600 hover:bg-red-500 text-white text-xs px-3 py-1.5 rounded transition shadow-sm">
              <i class="fa-solid fa-trash mr-1"></i> Supprimer l'épingle
            </button>
          </div>
        </div>
      `;
      pinMarker.bindPopup(popupContent);
      pinsLayerGroup.addLayer(pinMarker);

      togglePinMode();
    }

    // --- SUPPRESSION D'UNE FORME ---
    function removeShape(shapeId) {
      const shapeData = activeShapes[shapeId];
      if (shapeData) {
        shapeData.group.removeLayer(shapeData.layer);
        delete activeShapes[shapeId];
      }
      map.closePopup();
    }

    // --- COPIER DANS LE PRESSE-PAPIER ---
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-4 right-4 bg-slate-900 text-white px-3 py-2 rounded-lg text-xs shadow-lg z-50';
        toast.innerText = `Copié : ${text}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
      });
    }

    // Lancement au chargement de la page
    window.onload = initMap;
  </script>
</body>
</html>
